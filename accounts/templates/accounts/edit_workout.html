{% extends "accounts/base_dashboard.html" %}
{% load static %}

{% block content %}

<h2 class="page-title">Edit Workout</h2>

<form method="post" class="add-form">
    {% csrf_token %}

    <label>Exercise</label>
    <input type="text" name="exercise_name"
           value="{{ workout.exercise_name }}" required>

    <label>Sets</label>
    <input type="number" name="sets"
           value="{{ workout.sets }}" required>

    <label>Reps</label>
    <input type="number" name="reps"
           value="{{ workout.reps }}" required>

    <label>Weight</label>
    <input type="number" name="weight"
           value="{{ workout.weight }}">

    <button type="submit" class="btn-primary">Update Workout</button>
</form>

{% endblock %}
